import json
import pathlib
import sys

import frontmatter
import jsonschema


ROOT = pathlib.Path(__file__).resolve().parent.parent
SCHEMA_PATH = ROOT / "schemas" / "scenario.schema.json"
SCENARIOS_PATH = ROOT / "scenarios"


def main() -> int:
    with open(SCHEMA_PATH, "r", encoding="utf-8") as file:
        schema = json.load(file)

    validator = jsonschema.Draft7Validator(schema)
    errors_found = False
    validated_count = 0

    scenario_files = sorted(SCENARIOS_PATH.glob("*.md"))

    for md_file in scenario_files:
        post = frontmatter.load(md_file)

        # Skip normal markdown pages without scenario frontmatter
        if not post.metadata:
            print(f"Skipping: {md_file.name} (no frontmatter)")
            continue

        # Only validate files that opt into the scenario schema
        if post.metadata.get("schema_kind") != "agility-game-scenario":
            print(f"Skipping: {md_file.name} (not an Agility Game scenario)")
            continue

        validated_count += 1
        print(f"Validating: {md_file.name}")

        errors = sorted(
            validator.iter_errors(post.metadata),
            key=lambda error: list(error.path),
        )

        if errors:
            errors_found = True
            print("❌ Validation failed")

            for error in errors:
                path = ".".join(str(part) for part in error.path) or "<root>"
                print(f"  - {path}: {error.message}")
        else:
            print("✅ Valid")

    if validated_count == 0:
        print("No Agility Game scenario markdown files found.")
        return 1

    if errors_found:
        return 1

    print(f"\nAll {validated_count} scenario(s) valid.")
    return 0


if __name__ == "__main__":
    sys.exit(main())
